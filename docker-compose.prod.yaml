services:
  auth-db:
    image: postgres:15-alpine
    container_name: ragbot_auth_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secure_password
      POSTGRES_DB: ragbot_auth
    ports:
      # Expose only to localhost for Caddy/Server security
      - "127.0.0.1:15432:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d ragbot_auth"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  auth-server:
    build:
      context: ../auth-server
      dockerfile: Dockerfile
    container_name: ragbot_auth_server
    ports:
      # Expose to localhost so Caddy can proxy to it
      - "127.0.0.1:4000:4000"
    environment:
      - DATABASE_URL=postgresql://admin:secure_password@auth-db:5432/ragbot_auth?schema=public
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=https://admin-gp.innovin.win
      - CORS_ORIGINS=https://admin-gp.innovin.win
    depends_on:
      auth-db:
        condition: service_healthy
    restart: always

  ragbot-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: ragbot_api
    depends_on:
      auth-db:
        condition: service_healthy
    ports:
      # Expose to localhost so Caddy can proxy to it
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    environment:
      - CHAT_DATABASE_URL=postgresql://admin:secure_password@auth-db:5432/ragbot_auth
      # --- Latency optimization knobs (version-controlled; these override the
      #     host .env for the same keys). Secrets stay in the host .env. ---
      - LANG_DETECT_LANGUAGES=en,es,fr      # local lang detect, main languages
      - PROMPT_CACHE_KEY=gloriapets-tools-v1 # prompt-cache routing (safe win)
      - INTENT_ROUTER_LLM=0                  # intent derived from tools (no LLM)
      - TOOL_DISPATCH_WORKERS=8              # concurrency for multi-tool rounds
      - RERANK_CANDIDATE_MULTIPLIER=3        # rerank over-fetch = max(limit*3, MIN)
      - RERANK_CANDIDATE_MIN=20
      # Chat-DB connection pool. Set 0 (then redeploy) to instantly revert to
      # per-call connections if persistence misbehaves.
      - CHAT_DB_POOL=1
    restart: always

  ragbot-web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: ragbot_web
    ports:
      # Expose to localhost so Caddy can proxy to it
      - "127.0.0.1:3000:3000"
    environment:
      - NEXT_PUBLIC_AUTH_URL=https://gloriapets-chatbot.innovin.win
      - NEXT_PUBLIC_API_BASE_URL=https://gloriapets-chatbot.innovin.win
    depends_on:
      - auth-server
      - ragbot-api
    restart: always

  admin-gp:
    build:
      context: ./admin-gp
      dockerfile: Dockerfile
    container_name: ragbot_admin_gp
    ports:
      # Expose to localhost so Caddy can proxy to it
      - "127.0.0.1:3001:3000"
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_AUTH_URL=https://admin-gp.innovin.win
      - NEXT_PUBLIC_API_BASE_URL=https://admin-gp.innovin.win
      - AUTH_SERVER_INTERNAL_URL=http://auth-server:4000
      - RAGBOT_API_INTERNAL_URL=http://ragbot-api:8000
    depends_on:
      - auth-server
      - ragbot-api
    restart: always

volumes:
  auth_db_data:
