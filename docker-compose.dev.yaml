services:
  auth-db:
    image: postgres:15-alpine
    container_name: ragbot_auth_db_dev
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secure_password
      POSTGRES_DB: ragbot_auth
    ports:
      # Expose locally for testing constraints
      - "15432:5432"
    restart: unless-stopped

  auth-server:
    build:
      context: ../auth-server
      dockerfile: Dockerfile
    container_name: ragbot_auth_server_dev
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=postgresql://admin:secure_password@auth-db:5432/ragbot_auth?schema=public
      - BETTER_AUTH_SECRET=local_dev_secret_key_1234
      - BETTER_AUTH_URL=http://localhost:4000
      - CORS_ORIGINS=http://localhost:3000,http://localhost:4000
    depends_on:
      - auth-db
    restart: unless-stopped

  ragbot-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: ragbot_api_dev
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - CHAT_DATABASE_URL=postgresql://admin:secure_password@auth-db:5432/ragbot_auth
    restart: unless-stopped

  ragbot-web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: ragbot_web_dev
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_AUTH_URL=http://localhost:4000
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
    depends_on:
      - auth-server
      - ragbot-api
    restart: unless-stopped

  admin-gp:
    build:
      context: ./admin-gp
      dockerfile: Dockerfile
    container_name: ragbot_admin_gp_dev
    ports:
      - "3001:3000"
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_AUTH_URL=http://localhost:4000
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
    depends_on:
      - auth-server
      - ragbot-api
    restart: unless-stopped
